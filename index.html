<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Task Scheduler Pro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <div class="card">
    <h1>✨ Task Scheduler</h1>

    <div class="input-group">
      <input id="taskInput" placeholder="Nhập công việc..." />
      <input type="datetime-local" id="timeInput" />
      <button id="addBtn">+</button>
    </div>

    <input id="searchInput" placeholder="🔍 Tìm kiếm..." />

    <div class="filters">
      <button onclick="setFilter('all')">All</button>
      <button onclick="setFilter('active')">Pending</button>
      <button onclick="setFilter('completed')">Done</button>
    </div>

    <ul id="taskList"></ul>

    <p id="taskCount"></p>

    <div class="actions">
      <button onclick="clearCompleted()">🗑 Clear</button>
      <button onclick="toggleDarkMode()">🌙</button>
    </div>

    <!-- MUSIC -->
    <div class="music-player">
      <p id="nowPlaying">🎵 Chưa phát</p>

      <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button onclick="toggleMusic()">▶️</button>
        <button onclick="nextSong()">⏭</button>
      </div>

      <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5">
    </div>

    <audio id="bgMusic"></audio>

  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
